# 基本代理测试，实现反向代理

# 全局设置
worker_processes 1;  #worker 进程数

event {
    worker_connections 512; # 每个worker 进程可以创建的最大客户端连接数目
    use epoll; # 架构选取，这里选用epoll

}

# HTTP 设置
http {
    # HTTP MAIN

    # 虚拟主机定义
    server {
        listen 8000; # 主机监听端口号
        server_name "192.168.59.129:8000"; # 主机名，用于主机匹配host header
        # 路由
        location / {
            proxy_pass "http://127.0.0.1:8080";
        }
        location /rps {
            proxy_set_header message nihao; # 占位，测试rps未设置代理的回复
        }
    }

}