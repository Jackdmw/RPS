# comment test
worker_processes 1;
event {
    worker_connections 512;
    use epoll;
}

http {
    upstream backend{
        server 127.0.0.1:8082 weight=2;
        server 127.0.0.1:8083 weight=4;
        keepalive 12;
        keepalive_timeout 60000;
        keepalive_requests 5;
    }
    server {
        listen 8000;
        server_name "192.168.59.129:8000";
        location / {
            proxy_pass "http://127.0.0.1:8080";
            proxy_set_header Role Jack;
            proxy_set_header X-Forward-For 0.0.0.0;
        }
        location /api {
            proxy_pass "http://127.0.0.1:8081";
            proxy_pass_request_body  off;
        }
        location /hello {
            proxy_set_header Host RPS;
        }
    }
    server {
        listen 8001;
        server_name "192.168.59.129:8001";
        location / {
            proxy_pass "http://127.0.0.1:8081";
        }
    }
    server {
        listen 8001;
        server_name "feixingxr.com";
        location / {
            proxy_pass backend;
            proxy_set_header Role feixingxuerong;
        }
    }
}