# comment test
worker_processes 1;
event {
    worker_connections 512;
    use epoll;
}

http {
    server {
        listen 8000;
        server_name "192.168.59.129:8000";
        location / {
            proxy_pass "http://127.0.0.1:8080";
        }
        location /api {
            proxy_pass "http://127.0.0.1:8081";
        }
        location /hello {
            proxy_set_header Host RPS;
        }
    }
    server {
        listen 8001;
        server_name "192.168.59.129:8001";
        location / {
            proxy_pass "http://127.0.0.1:8081";
        }
    }
}